name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build & publish DMG
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Set up signing
        env:
          SIGNING_CERT_P12: ${{ secrets.SIGNING_CERT_P12 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: ./Tools/ci-setup-signing.sh

      - name: Build
        run: ./build.sh

      - name: Selftest
        run: ./build/Vorssaint --selftest

      - name: Notarize app
        env:
          NOTARY_API_KEY_P8: ${{ secrets.NOTARY_API_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: ./Tools/notarize.sh build/stage/Vorssaint.app

      - name: Package DMG
        run: ./Tools/make-dmg.sh

      - name: Notarize DMG
        env:
          NOTARY_API_KEY_P8: ${{ secrets.NOTARY_API_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: ./Tools/notarize.sh dist/*.dmg

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            Vorssaint is signed with a Developer ID and notarized by Apple, so it
            opens normally. Drag it to Applications and launch it.
